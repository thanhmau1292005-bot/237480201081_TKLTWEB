<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Phiếu đăng ký dự thi thể thao</title>
</head>
<body style="font-family: Arial, sans-serif; line-height: 1.6; margin: 0; padding: 20px;">

    <div style="max-width: 800px; margin: 0 auto; border: 1px solid #ccc; padding: 20px;">
        <div style="background-color: #C0C0C0; padding: 10px; font-weight: bold; margin-bottom: 20px;">
            Đăng ký thể thao
        </div>

        <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 30px;">
            <div style="text-align: center;">
                <strong>TRƯỜNG ĐẠI HỌC BẠC LIÊU</strong><br>
                KHOA KỸ THUẬT VÀ CÔNG NGHỆ
            </div>
            <div style="text-align: center;">
                <strong>CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</strong><br>
                Độc lập - Tự do - Hạnh phúc
            </div>
        </div>

        <h1 style="font-family: Verdana, sans-serif; color: Red; text-align: center;">PHIẾU ĐĂNG KÝ DỰ THI THỂ THAO</h1>

        <form action="/submit-form" method="POST">
            <table style="width: 100%; border-collapse: collapse; margin-top: 20px;">
                <tr>
                    <td width="30%" align="center" style="border: 1px solid #000; padding: 15px;">
                        <img src="logo_blu.jpg" width="120" alt="Logo BLU">
                    </td>
                    <td width="70%" style="border: 1px solid #000; padding: 15px;">
                        <p><label>Họ tên: </label><input type="text" name="fullname" size="25"></p>
                        <p><label>Mật khẩu: </label><input type="password" name="pwd" size="25"></p>
                        <p>
                            <strong>Môn thể thao:</strong><br>
                            <label><input type="checkbox" name="sport" value="soccer"> Bóng đá</label><br>
                            <label><input type="checkbox" name="sport" value="volleyball"> Bóng chuyền</label><br>
                            <label><input type="checkbox" name="sport" value="track"> Điền kinh</label><br>
                            <label><input type="checkbox" name="sport" value="swimming"> Bơi lội</label>
                        </p>
                    </td>
                </tr>
                <tr style="background-color: #C0C0C0; text-align: center; font-weight: bold;">
                    <td colspan="2" style="border: 1px solid #000; padding: 15px;">PHẦN CỨNG MÁY TÍNH</td>
                </tr>
                <tr>
                    <td colspan="2" style="border: 1px solid #000; padding: 15px;">
                        <div style="display: flex; gap: 20px;">
                            <div>
                                <strong>Thiết bị:</strong><br>
                                <select name="hardware" size="4" style="width: 150px;">
                                    <option value="cpu">CPU</option>
                                    <option value="mainboard">Mainboard</option>
                                    <option value="dvd">ASUS DVD</option>
                                    <option value="ram">RAM KingMax</option>
                                    <option value="ramlau">RAM Lậu</option>
                                </select>
                            </div>
                            <div>
                                <strong>Thời gian bảo hành:</strong><br>
                                <select name="warranty">
                                    <option>1 năm</option>
                                    <option>2 năm</option>
                                    <option>3 năm</option>
                                </select>
                                <div style="margin-top: 15px;">
                                    <button type="submit">Submit</button>
                                    <button type="reset">Reset</button>
                                </div>
                            </div>
                        </div>
                    </td>
                </tr>
            </table>
        </form>
    </div>

</body>
</html>
